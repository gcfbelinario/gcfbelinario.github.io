<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centered Infinite Image Slider</title>
  <style>

    .gallery-container {
  display: flex;
  justify-content: center; /* horizontal centering */
  align-items: center;     /* vertical centering */
  min-height: 100vh;       /* or set a fixed height if needed */
}


    body {
      display: flex;
      justify-content: center; /* centers horizontally */
      align-items: center;     /* centers vertically */
      height: 100vh;           /* full viewport height */
      margin: 0;
      background: #f0f0f0;
    }

    .slider {
      position: relative;
      width: 600px;
      height: 400px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .slides {
      display: flex;
      width: max-content;
      height: 100%;
      animation: slide 16s linear infinite;
    }

    .slides img {
      width: 600px;
      height: 400px;
      object-fit: cover;
    }

    @keyframes slide {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(0); }
      25%  { transform: translateX(-600px); }
      45%  { transform: translateX(-600px); }
      50%  { transform: translateX(-1200px); }
      70%  { transform: translateX(-1200px); }
      75%  { transform: translateX(-1800px); }
      95%  { transform: translateX(-1800px); }
      100% { transform: translateX(0); }
    }

    .slide {
  position: relative;       /* so caption can be positioned inside */
}

.slide img {
  width: 600px;
  height: 400px;
  object-fit: cover;
  display: block;
}

.caption {
  position: absolute;
  bottom: 0;                /* stick to bottom of image */
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.6); /* semi-transparent black background */
  color: #fff;
  text-align: center;
  padding: 10px;
  font-size: 16px;
}

.auto-height {
  width: 600px;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.auto-height .slides {
  display: flex;
  animation: slide 12s linear infinite;
}

.auto-height .slide {
  position: relative;
  flex-shrink: 0;
}

.auto-height .slide img {
  width: 600px;
  height: auto;   /* natural height */
  display: block;
}

.auto-height .caption {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  text-align: center;
  padding: 10px;
}



  </style>
</head>
<body>

<div class="slider auto-height">
  <div class="slides">
    <div class="slide">
      <img src="https://picsum.photos/id/1015/600/400" alt="Wide Image">
      <div class="caption">Landscape (400px tall)</div>
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/1024/600/800" alt="Tall Image">
      <div class="caption">Portrait (800px tall)</div>
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/1016/600/600" alt="Medium Image">
      <div class="caption">Medium (500px tall)</div>
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/1016/600/200" alt="Medium Image">
      <div class="caption">Medium (500px tall)</div>
    </div>
  </div>
</div>




</body>
</html>
